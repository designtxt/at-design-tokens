name: Publish Lexicons

on:
  push:
    branches:
      - main
    paths:
      - 'lexicons/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install goat
        run: go install github.com/bluesky-social/goat@latest

      - name: Add goat to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Lint lexicons
        run: goat lex lint

      - name: Check DNS resolution
        run: goat lex check-dns

      - name: Publish lexicons
        env:
          ATP_USERNAME: ${{ secrets.ATP_USERNAME }}
          ATP_PASSWORD: ${{ secrets.ATP_PASSWORD }}
        run: goat lex publish --update
