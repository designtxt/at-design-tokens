name: Publish Lexicons

on:
  push:
    branches:
      - main
    paths:
      - 'lexicons/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install goat
        run: go install github.com/bluesky-social/goat@latest

      - name: Add goat to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Lint lexicons
        run: goat lex lint

      - name: Check DNS resolution
        run: goat lex check-dns

      - name: Publish lexicons
        env:
          GOAT_USERNAME: ${{ secrets.GOAT_USERNAME }}
          GOAT_PASSWORD: ${{ secrets.GOAT_PASSWORD }}
        run: goat lex publish --update
